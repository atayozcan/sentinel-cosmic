#
# aarch64 Qt link fix.
#
# openSUSE's Qt6 for aarch64 ships linker flags that include
# `-Wl,--fix-cortex-a53-835769` (a Cortex-A53 erratum workaround). That
# flag is understood by GNU ld.bfd / ld.gold but NOT by LLVM lld.
# `qt-build-utils` otherwise forces `-fuse-ld=lld` for Qt links (it
# deliberately avoids the system default), which then fails with
# `ld.lld: error: unknown argument '--fix-cortex-a53-835769'`.
#
# Pinning GNU bfd here (aarch64 only) makes that flag valid again, and
# because `-fuse-ld` is now present in the rustflags, qt-build-utils
# leaves the linker choice alone (see its platform.rs guard). x86_64 is
# unaffected — no erratum flag there, so lld keeps working.
[target.aarch64-unknown-linux-gnu]
rustflags = ["-C", "link-arg=-fuse-ld=bfd"]
