name: docs

# Build the mdBook in `docs/` and deploy to GitHub Pages on every
# push to main. Manual dispatch is also exposed for a one-off
# rebuild after a wiki migration / typo fix.
#
# Site URL: https://atayozcan.github.io/sentinel/
# Source: docs/src/*.md, configured by docs/book.toml

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

# One concurrent docs build at a time; cancel earlier in-progress runs
# so a quick succession of doc PRs doesn't queue up redundant
# deployments.
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: mdbook build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install mdBook
        run: |
          MDBOOK_VERSION=0.4.40
          curl -sSL "https://github.com/rust-lang/mdBook/releases/download/v${MDBOOK_VERSION}/mdbook-v${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz -C /usr/local/bin

      - name: Build site
        run: mdbook build docs

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          # First-run convenience: if the repo doesn't have Pages
          # enabled yet, the action provisions it (source = "GitHub
          # Actions"). On subsequent runs it's a no-op.
          enablement: true

      - name: Upload artefact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/book

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
