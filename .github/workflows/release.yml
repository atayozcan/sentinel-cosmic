name: release

on:
  push:
    tags:
      - 'v*'

# Don't cancel an in-flight release if a second tag is pushed before
# the first finishes — unlike CI on PRs, partial releases are bad
# (half-uploaded artifacts, draft GH release with missing assets).
# Queue the second one instead.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# Default to read-only for the workflow; jobs that need to create
# releases / push attestations / publish to AUR override below with
# explicit narrow scopes. Scorecard's TokenPermissionsID rule is
# unhappy when broad write perms are at the top level.
permissions:
  contents: read

env:
  # Use mold for faster linking; doesn't affect the shipped binary
  # beyond build-id. Each matrix job's apt-get installs mold before
  # cargo runs. See ci.yml for the same setup on PR builds.
  RUSTFLAGS: -C link-arg=-fuse-ld=mold

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.runs-on }}
    permissions:
      # Sigstore attestation upload binds the artifact's sha256 to
      # the workflow's OIDC identity (the binding stays on the repo's
      # /attestations endpoint, not here). Verify downstream with
      # `gh attestation verify <file> --repo atayozcan/sentinel`.
      id-token: write
      attestations: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            arch: x86_64
            deb-arch: amd64
            runs-on: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            arch: aarch64
            deb-arch: arm64
            runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v6

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libpam0g-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            pkg-config \
            mold

      - name: Install rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-deb and cargo-generate-rpm
        run: |
          cargo install --locked cargo-deb
          cargo install --locked cargo-generate-rpm

      - name: Resolve version
        id: ver
        run: |
          v="${GITHUB_REF_NAME#v}"
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: Build tarballs
        run: ./scripts/build-release.sh "${{ steps.ver.outputs.version }}"

      - name: Build .deb
        run: |
          cargo deb --no-build -p sentinel-helper
          mkdir -p dist
          mv target/debian/*.deb dist/

      - name: Build .rpm
        run: |
          # cargo-generate-rpm reads paths relative to the workspace root
          cd "$GITHUB_WORKSPACE"
          cargo generate-rpm -p crates/sentinel-helper --output dist/

      # Sigstore artifact attestations. Each .deb / .rpm / .tar.gz
      # gets a signed bundle proving it was built by THIS workflow run
      # at this commit. Stored on the repo's attestations endpoint;
      # consumers verify with:
      #   gh attestation verify <file> --repo atayozcan/sentinel
      # Documented in SECURITY.md → Threat model → Supply-chain integrity.
      - name: Attest release artefacts
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            dist/*.deb
            dist/*.rpm
            dist/*.tar.gz

      - name: Upload artefacts
        uses: actions/upload-artifact@v7
        with:
          name: sentinel-${{ steps.ver.outputs.version }}-${{ matrix.arch }}
          path: dist/

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      # gh release create needs write on contents to create the
      # release object and upload assets.
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Verify release-notes file exists
        # Fail fast if the release-notes/v$VERSION.md is missing — gh
        # release create with --notes-file would otherwise error out
        # AFTER tagging and uploading artefacts, leaving us with a
        # half-published release.
        run: |
          v="${GITHUB_REF_NAME#v}"
          if [ ! -f ".github/release-notes/v$v.md" ]; then
            echo "::error::missing .github/release-notes/v$v.md — create it before tagging" >&2
            exit 1
          fi

      - name: Download artefacts
        uses: actions/download-artifact@v8
        with:
          path: artefacts

      - name: Flatten
        run: |
          mkdir -p dist
          # Each artefact has a unique name across the matrix (the
          # source tarball + its sha256 are produced only on x86_64,
          # everything else is per-arch named), so a plain mv is safe
          # — no collisions to worry about.
          find artefacts -type f \( -name '*.tar.gz' -o -name '*.sha256' -o -name '*.deb' -o -name '*.rpm' \) -exec mv -t dist/ {} +
          ls -la dist

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          v="${GITHUB_REF_NAME#v}"
          gh release create "$GITHUB_REF_NAME" \
            --title "Sentinel v$v" \
            --notes-file .github/release-notes/v$v.md \
            dist/*

  # ---------------------------------------------------------------------------
  # AUR publish.
  #
  # Runs after `release` because the stable PKGBUILD's `source=` URL is
  # GitHub's auto-generated tag tarball, which exists as soon as the tag
  # is pushed — so technically we don't need `release` to finish. But
  # gating on it ensures we only publish to AUR when the build + release
  # actually succeeded, avoiding "tag exists, AUR updated, but release
  # is broken" states.
  #
  # Secrets required (set under repo Settings → Secrets and variables →
  # Actions):
  #   AUR_SSH_PRIVATE_KEY  — private half of an ed25519 key whose public
  #                          half is registered on the AUR account
  #                          (https://aur.archlinux.org/account/sipsip,
  #                          "SSH Public Key" field). Must be AUR-only;
  #                          do NOT reuse your personal key.
  #
  # First-time bootstrap is still manual — the action pushes to an
  # existing AUR repo, it doesn't create one. See packaging/arch/README.md
  # for the one-time `git clone ssh://aur@aur.archlinux.org/<pkg>.git`
  # step.
  #
  # We deliberately do NOT run a clean-chroot `makepkg -s` here:
  # `release.yml`'s `build` job already did `cargo build --release
  # --workspace --locked` with the same SENTINEL_* env vars the
  # PKGBUILDs use, and a second build with libcosmic from git would
  # add ~10 minutes per matrix entry for marginal value. The action's
  # built-in `.SRCINFO` generation catches PKGBUILD syntax errors, and
  # `updpkgsums` catches a wrong source URL. If you ever want a real
  # chroot smoke-test, drop in `extra-x86_64-build` from
  # `archlinux/devtools` before the deploy step.
  publish-aur:
    needs: release
    runs-on: ubuntu-latest
    # Only needs to read the repo + the AUR_SSH_PRIVATE_KEY secret;
    # no write access to anything on github.com.
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - pkgname: sentinel
            pkgbuild: packaging/arch/PKGBUILD
          - pkgname: sentinel-git
            pkgbuild: packaging/arch/PKGBUILD-git
    steps:
      - uses: actions/checkout@v6

      - name: Stage PKGBUILD
        run: |
          mkdir -p aur-stage
          cp "${{ matrix.pkgbuild }}" aur-stage/PKGBUILD

      # Pin to a tagged release (not @master) so a hijacked action can't
      # silently push to AUR with our key. Bump deliberately. Latest
      # versions: https://github.com/KSXGitHub/github-actions-deploy-aur/releases
      #
      # v2.7.2 broke against the 2026-04 archlinux:base image with
      # `==> ERROR: There is no secret key available to sign with.`;
      # v4.1.3 (used here) has the docker-image fix that disables
      # signing properly.
      - name: Publish to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v4.1.3
        with:
          pkgname: ${{ matrix.pkgname }}
          pkgbuild: aur-stage/PKGBUILD
          commit_username: sipsip
          commit_email: atayozcan@pm.me
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Release ${{ github.ref_name }}"
          updpkgsums: true
          ssh_keyscan_types: rsa,ed25519
